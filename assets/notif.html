<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #root {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
  }

  /* ── Card ── */
  .card {
    width: 380px;
    background: #ffffff;
    border-radius: 14px;
    box-shadow:
      0 2px 8px  rgba(0,0,0,0.08),
      0 8px 24px rgba(0,0,0,0.13),
      0 0  0 1px rgba(0,0,0,0.04);
    padding: 13px 14px;
    display: flex;
    align-items: flex-start;
    gap: 11px;
    border: 1px solid rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;          /* clips progress bar to rounded corners */
  }

  /* Entrance animation — spring pop from right */
  .card.new {
    animation: spring-in 0.42s cubic-bezier(0.22, 1.4, 0.36, 1) both;
  }

  @keyframes spring-in {
    0%   { transform: translateX(52px) scale(0.90); opacity: 0; filter: blur(3px); }
    55%  { transform: translateX(-5px) scale(1.02); opacity: 1; filter: blur(0);   }
    75%  { transform: translateX(2px)  scale(0.99); }
    100% { transform: translateX(0)    scale(1);    opacity: 1; }
  }

  /* Dismiss animation */
  .card.out {
    animation: slide-out 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  @keyframes slide-out {
    0%   { transform: translateX(0)    scale(1);    opacity: 1; max-height: 100px; }
    100% { transform: translateX(52px) scale(0.92); opacity: 0; max-height: 0;     }
  }

  /* ── Progress bar (inside card, clipped by overflow:hidden) ── */
  .progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 3px;
    width: 100%;
    transition: width 0.95s linear;
    border-radius: 0;          /* card overflow clips the corners */
  }

  /* ── Icon ── */
  .icon-wrap {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.06);
  }

  /* ── Body ── */
  .body { flex: 1; min-width: 0; }

  .title {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    line-height: 1.35;
  }

  .desc {
    font-size: 12px;
    color: #6b7280;
    margin-top: 3px;
    line-height: 1.45;
  }

  /* ── Countdown ── */
  .countdown-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .countdown-num {
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
    display: inline-block;
  }

  .countdown-num.tick {
    animation: tick-pop 0.18s cubic-bezier(0.34, 1.6, 0.64, 1);
  }

  @keyframes tick-pop {
    0%   { transform: scale(1.20); }
    100% { transform: scale(1);    }
  }

  .countdown-lbl {
    font-size: 13px;
    color: #6b7280;
    font-weight: 400;
  }

  /* ── Close button ── */
  .close-btn {
    background: none;
    border: none;
    color: #b0b7c3;
    font-size: 12px;
    cursor: pointer;
    padding: 3px 4px;
    line-height: 1;
    flex-shrink: 0;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    margin-top: -1px;
  }

  .close-btn:hover {
    color: #374151;
    background: #f3f4f6;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const CARD_H  = 72;
  const GAP     = 8;
  const PADDING = 16;
  const COUNTDOWN_MAX = 15;

  const notifs = {};

  function computeHeight() {
    const n = Object.keys(notifs).length;
    if (n === 0) return 0;
    return n * CARD_H + (n - 1) * GAP + PADDING;
  }

  function renderAll(animateKey) {
    const root = document.getElementById('root');
    root.querySelectorAll('.card').forEach(el => {
      if (!notifs[el.dataset.key]) el.remove();
    });
    Object.keys(notifs).forEach(key => {
      if (root.querySelector(`[data-key="${key}"]`)) return;
      root.appendChild(buildCard(key, notifs[key], key === animateKey));
    });
    window.notifAPI.resize(computeHeight());
  }

  function buildCard(key, data, animate) {
    const card = document.createElement('div');
    card.className = 'card' + (animate ? ' new' : '');
    card.dataset.key = key;
    card.style.borderColor = data.borderColor || 'rgba(0,0,0,0.06)';
    if (data.bgColor) card.style.background = data.bgColor;

    // Progress bar — always present, sits inside the card's overflow:hidden
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    bar.style.background = data.color || '#e5e7eb';
    if (data.countdown !== undefined) {
      // Start at current fraction, will animate each tick
      bar.style.transition = 'none';
      bar.style.width = (data.countdown / COUNTDOWN_MAX * 100) + '%';
      requestAnimationFrame(() => {
        bar.style.transition = 'width 0.95s linear';
      });
    }
    card.appendChild(bar);

    // Icon
    const iconWrap = document.createElement('div');
    iconWrap.className = 'icon-wrap';
    iconWrap.style.background  = data.iconBg || '#f3f4f6';
    iconWrap.style.borderColor = data.borderColor || 'rgba(0,0,0,0.06)';
    iconWrap.textContent = data.icon || '🔔';
    card.appendChild(iconWrap);

    // Body
    const body = document.createElement('div');
    body.className = 'body';
    renderBody(body, data);
    card.appendChild(body);

    // Close
    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-btn';
    closeBtn.innerHTML = '&#x2715;';
    closeBtn.onclick = () => dismissCard(key, card);
    card.appendChild(closeBtn);

    return card;
  }

  function dismissCard(key, cardEl) {
    delete notifs[key];
    cardEl.classList.remove('new');
    cardEl.classList.add('out');
    cardEl.addEventListener('animationend', () => {
      cardEl.remove();
      window.notifAPI.resize(computeHeight());
    }, { once: true });
  }

  function renderBody(body, data) {
    body.innerHTML = '';
    if (data.countdown !== undefined) {
      const row = document.createElement('div');
      row.className = 'countdown-row';
      const num = document.createElement('span');
      num.className = 'countdown-num';
      num.style.color = data.color || '#111827';
      num.textContent = data.countdown + 's';
      const lbl = document.createElement('span');
      lbl.className = 'countdown-lbl';
      lbl.textContent = 'to ' + (data.label || 'break');
      row.appendChild(num);
      row.appendChild(lbl);
      body.appendChild(row);
    } else {
      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = data.title || '';
      body.appendChild(title);
      if (data.description) {
        const desc = document.createElement('div');
        desc.className = 'desc';
        desc.textContent = data.description;
        body.appendChild(desc);
      }
    }
  }

  // ── IPC listeners ──────────────────────────────────────────────────────────────

  window.notifAPI.onNotif((data) => {
    const isNew = !notifs[data.key];
    notifs[data.key] = data;

    if (!isNew && data.countdown !== undefined) {
      const cardEl = document.querySelector(`[data-key="${data.key}"]`);
      if (cardEl) {
        // Update number with tick pop
        const numEl = cardEl.querySelector('.countdown-num');
        if (numEl) {
          numEl.textContent = data.countdown + 's';
          numEl.classList.remove('tick');
          void numEl.offsetWidth;
          numEl.classList.add('tick');
        }
        // Shrink progress bar
        const bar = cardEl.querySelector('.progress-bar');
        if (bar) bar.style.width = (data.countdown / COUNTDOWN_MAX * 100) + '%';
        return;
      }
    }

    renderAll(isNew ? data.key : null);
  });

  window.notifAPI.onDismiss((key) => {
    const card = document.querySelector(`[data-key="${key}"]`);
    if (card) dismissCard(key, card);
    else delete notifs[key];
  });
</script>
</body>
</html>
